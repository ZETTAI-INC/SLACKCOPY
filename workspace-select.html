<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ワークスペースを選択</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #f8f8f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .ws-container { max-width: 500px; width: 100%; padding: 24px; text-align: center; }
    .ws-title { font-size: 28px; font-weight: 700; color: #1d1c1d; margin-bottom: 8px; }
    .ws-subtitle { color: #616061; margin-bottom: 32px; font-size: 15px; }
    .ws-list { display: flex; flex-direction: column; gap: 12px; }
    .ws-card { display: flex; align-items: center; gap: 16px; background: white; padding: 16px 20px; border-radius: 12px; border: 1px solid #e1e1e1; cursor: pointer; text-align: left; text-decoration: none; color: inherit; transition: box-shadow 0.15s; }
    .ws-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .ws-card-icon { width: 52px; height: 52px; border-radius: 12px; background: #4a154b; color: white; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; flex-shrink: 0; }
    .ws-card-info h3 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .ws-card-info p { font-size: 13px; color: #616061; }
    .ws-card-arrow { margin-left: auto; color: #ccc; font-size: 20px; }
    .ws-create { display: inline-flex; align-items: center; gap: 8px; margin-top: 24px; padding: 12px 24px; border: 2px dashed #ccc; border-radius: 12px; color: #616061; cursor: pointer; font-size: 14px; text-decoration: none; }
    .ws-create:hover { border-color: #4a154b; color: #4a154b; }
    .ws-footer { margin-top: 24px; }
    .ws-footer a { color: #1264a3; text-decoration: none; font-size: 14px; cursor: pointer; }
    .ws-footer a:hover { text-decoration: underline; }
    .ws-loading { padding: 40px; color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <div class="ws-container">
    <h1 class="ws-title">ワークスペースを選択</h1>
    <p class="ws-subtitle" id="wsSubtitle">読み込み中...</p>
    <div class="ws-list" id="wsList">
      <div class="ws-loading">ワークスペースを読み込んでいます...</div>
    </div>
    <a href="workspace-create.html" class="ws-create">＋ 新しいワークスペースを作成</a>
    <div class="ws-footer">
      <a onclick="handleLogout()">別のアカウントでサインイン</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script>
    const colors = ['#4a154b','#1264a3','#2bac76','#e01e5a','#ecb22e','#36c5f0'];

    (async () => {
      const user = await getCurrentUser();
      if (!user) { window.location.href = 'auth.html'; return; }

      document.getElementById('wsSubtitle').textContent = user.email + ' でサインイン中';

      const workspaces = await fetchMyWorkspaces();
      const list = document.getElementById('wsList');

      if (workspaces.length === 0) {
        window.location.href = 'workspace-create.html';
        return;
      }

      list.innerHTML = '';
      workspaces.forEach((ws, i) => {
        const card = document.createElement('a');
        card.href = '#';
        card.className = 'ws-card';
        card.innerHTML = '<div class="ws-card-icon" style="background:' + colors[i % colors.length] + '">' + ws.name.charAt(0).toUpperCase() + '</div>'
          + '<div class="ws-card-info"><h3>' + ws.name + '</h3><p>' + ws.role + '</p></div>'
          + '<span class="ws-card-arrow">›</span>';
        card.addEventListener('click', (e) => {
          e.preventDefault();
          localStorage.setItem('currentWorkspaceId', ws.id);
          window.location.href = 'index.html';
        });
        list.appendChild(card);
      });
    })();

    async function handleLogout() {
      await signOut();
      window.location.href = 'auth.html';
    }
  </script>
</body>
</html>
