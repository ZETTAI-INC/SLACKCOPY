<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { background: #0f0f15; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-container {
      width: 400px; padding: 40px; background: #1A1D21;
      border-radius: 16px; border: 1px solid #333;
    }
    .auth-logo { text-align: center; margin-bottom: 24px; }
    .auth-logo-icon {
      width: 56px; height: 56px; border-radius: 14px; background: #5B2C5E;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: white; margin-bottom: 12px;
    }
    .auth-title { font-size: 22px; font-weight: 700; color: #e8e8e8; text-align: center; margin-bottom: 6px; }
    .auth-subtitle { font-size: 14px; color: #888; text-align: center; margin-bottom: 28px; }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-field label {
      display: block; font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 6px;
    }
    .auth-field input {
      width: 100%; padding: 10px 14px; border: 1px solid #444; border-radius: 8px;
      background: #232529; color: #e0e0e0; font-size: 15px; font-family: var(--font);
      outline: none; box-sizing: border-box;
    }
    .auth-field input:focus { border-color: #1D9BD1; }
    .auth-field input::placeholder { color: #666; }

    .auth-error {
      display: none; padding: 10px 14px; background: #3a2020;
      border: 1px solid #e05050; border-radius: 8px;
      color: #ff8888; font-size: 13px;
    }
    .auth-error.show { display: block; }

    .auth-submit {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: #007a5a; color: white; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: var(--font);
    }
    .auth-submit:hover { background: #006248; }
    .auth-submit:disabled { background: #444; color: #888; cursor: not-allowed; }

    .auth-divider {
      display: flex; align-items: center; gap: 12px; margin: 4px 0;
      color: #555; font-size: 12px;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: #333;
    }

    .auth-switch {
      text-align: center; font-size: 14px; color: #888;
    }
    .auth-switch a {
      color: #1D9BD1; text-decoration: none; cursor: pointer;
    }
    .auth-switch a:hover { text-decoration: underline; }

    .auth-success {
      display: none; text-align: center; padding: 20px 0;
    }
    .auth-success.show { display: block; }
    .auth-success-icon { font-size: 48px; margin-bottom: 12px; }
    .auth-success h3 { color: #e8e8e8; font-size: 18px; margin-bottom: 8px; }
    .auth-success p { color: #888; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">K</div>
    </div>

    <!-- Login / Signup Form -->
    <div id="authForm">
      <h1 class="auth-title" id="authTitle">ログイン</h1>
      <p class="auth-subtitle" id="authSubtitle">メールアドレスとパスワードでログイン</p>

      <div class="auth-error" id="authError"></div>

      <form class="auth-form" id="authFormElement" onsubmit="return false;">
        <div class="auth-field">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" placeholder="name@example.com" required>
        </div>
        <div class="auth-field">
          <label for="password">パスワード</label>
          <input type="password" id="password" placeholder="パスワード（6文字以上）" required minlength="6">
        </div>
        <button type="submit" class="auth-submit" id="authSubmit">ログイン</button>
      </form>

      <div class="auth-divider">または</div>

      <div class="auth-switch">
        <span id="switchText">アカウントをお持ちでない方は </span>
        <a id="switchLink" onclick="toggleMode()">新規登録</a>
      </div>
    </div>

    <!-- Signup Success -->
    <div class="auth-success" id="signupSuccess">
      <div class="auth-success-icon">&#9993;&#65039;</div>
      <h3>確認メールを送信しました</h3>
      <p>メール内のリンクをクリックしてアカウントを有効にしてください。</p>
      <div style="margin-top:16px;">
        <a onclick="showLogin()" style="color:#1D9BD1;cursor:pointer;font-size:14px;">ログインページへ戻る</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script>
    let isLoginMode = true;

    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');
    const authSubmit = document.getElementById('authSubmit');
    const authError = document.getElementById('authError');
    const switchText = document.getElementById('switchText');
    const switchLink = document.getElementById('switchLink');
    const authForm = document.getElementById('authForm');
    const signupSuccess = document.getElementById('signupSuccess');
    const formElement = document.getElementById('authFormElement');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    function toggleMode() {
      isLoginMode = !isLoginMode;
      authError.classList.remove('show');

      if (isLoginMode) {
        showLogin();
      } else {
        authTitle.textContent = '新規登録';
        authSubtitle.textContent = 'メールアドレスとパスワードで登録';
        authSubmit.textContent = 'アカウントを作成';
        switchText.textContent = 'すでにアカウントをお持ちの方は ';
        switchLink.textContent = 'ログイン';
      }
    }

    function showLogin() {
      isLoginMode = true;
      authTitle.textContent = 'ログイン';
      authSubtitle.textContent = 'メールアドレスとパスワードでログイン';
      authSubmit.textContent = 'ログイン';
      switchText.textContent = 'アカウントをお持ちでない方は ';
      switchLink.textContent = '新規登録';
      authForm.style.display = '';
      signupSuccess.classList.remove('show');
      authError.classList.remove('show');
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.classList.add('show');
    }

    formElement.addEventListener('submit', async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) return;

      authSubmit.disabled = true;
      authError.classList.remove('show');

      try {
        if (isLoginMode) {
          // ログイン
          const result = await signInWithEmail(email, password);
          if (result.error) {
            showError(result.error);
            authSubmit.disabled = false;
            return;
          }
          // 成功 → メインページへ
          window.location.href = 'index.html';
        } else {
          // サインアップ
          const result = await signUpWithEmail(email, password);
          if (result.error) {
            showError(result.error);
            authSubmit.disabled = false;
            return;
          }
          // 成功 → 確認メール送信画面
          authForm.style.display = 'none';
          signupSuccess.classList.add('show');
        }
      } catch (e) {
        showError('エラーが発生しました: ' + e.message);
      }

      authSubmit.disabled = false;
    });

    // 既にログイン済みならリダイレクト
    (async () => {
      const user = await getCurrentUser();
      if (user) {
        window.location.href = 'index.html';
      }
    })();
  </script>
</body>
</html>
