<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slack にサインインする</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff; color: #1d1c1d; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }

    /* Header logo */
    .slack-header {
      padding: 48px 0 36px;
      text-align: center;
    }
    .slack-logo {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 28px; font-weight: 700; color: #1d1c1d; text-decoration: none;
    }
    .slack-logo-icon { width: 28px; height: 28px; }

    /* Main content */
    .auth-main {
      width: 100%; max-width: 500px; padding: 0 24px; text-align: center;
    }
    .auth-main h1 {
      font-size: 36px; font-weight: 900; line-height: 1.3;
      margin-bottom: 10px; letter-spacing: -0.5px;
    }
    .auth-main .subtitle {
      font-size: 16px; color: #454245; margin-bottom: 32px;
    }
    .auth-main .subtitle strong { font-weight: 700; color: #1d1c1d; }

    /* Email input */
    .email-input {
      width: 100%; padding: 14px 16px; font-size: 18px;
      border: 1px solid #babbbf; border-radius: 12px;
      outline: none; font-family: inherit; color: #1d1c1d;
    }
    .email-input:focus { border-color: #4a154b; box-shadow: 0 0 0 4px rgba(74,21,75,0.15); }
    .email-input::placeholder { color: #8d8d8e; }

    /* Password input */
    .password-input {
      width: 100%; padding: 14px 16px; font-size: 18px;
      border: 1px solid #babbbf; border-radius: 12px;
      outline: none; font-family: inherit; color: #1d1c1d;
      margin-top: 12px;
    }
    .password-input:focus { border-color: #4a154b; box-shadow: 0 0 0 4px rgba(74,21,75,0.15); }
    .password-input::placeholder { color: #8d8d8e; }

    /* Submit button */
    .submit-btn {
      width: 100%; padding: 16px; font-size: 18px; font-weight: 700;
      background: #4a154b; color: #fff; border: none; border-radius: 12px;
      cursor: pointer; font-family: inherit; margin-top: 16px;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #3b1139; }
    .submit-btn:disabled { background: #8d8d8e; cursor: not-allowed; }

    /* Error */
    .auth-error {
      display: none; padding: 12px 16px; margin-bottom: 16px;
      background: #fdf2f2; border: 1px solid #e8484e; border-radius: 10px;
      color: #e8484e; font-size: 14px; text-align: left;
    }
    .auth-error.show { display: block; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 16px;
      margin: 24px 0; color: #8d8d8e; font-size: 15px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #ddd;
    }

    /* Tab switcher */
    .auth-tabs {
      display: flex; margin-bottom: 28px; border-bottom: 2px solid #eee;
    }
    .auth-tab {
      flex: 1; padding: 14px 0; font-size: 16px; font-weight: 700;
      background: none; border: none; border-bottom: 3px solid transparent;
      cursor: pointer; font-family: inherit; color: #8d8d8e;
      margin-bottom: -2px; transition: color 0.2s, border-color 0.2s;
    }
    .auth-tab.active { color: #4a154b; border-bottom-color: #4a154b; }
    .auth-tab:hover:not(.active) { color: #1d1c1d; }

    /* Signup success */
    .auth-success { display: none; text-align: center; padding: 20px 0; }
    .auth-success.show { display: block; }
    .auth-success-icon { font-size: 48px; margin-bottom: 12px; }
    .auth-success h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .auth-success p { font-size: 15px; color: #616061; line-height: 1.6; }

    /* Footer */
    .auth-footer {
      margin-top: auto; padding: 32px 24px;
      font-size: 13px; color: #8d8d8e; text-align: center;
      display: flex; gap: 24px; justify-content: center;
    }
    .auth-footer a { color: #8d8d8e; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <!-- Slack logo -->
  <div class="slack-header">
    <a class="slack-logo" href="#">
      <svg class="slack-logo-icon" viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" fill-rule="evenodd">
          <path d="M19.712.133a5.381 5.381 0 0 0-5.376 5.387 5.381 5.381 0 0 0 5.376 5.386h5.376V5.52A5.381 5.381 0 0 0 19.712.133m0 14.365H5.376A5.381 5.381 0 0 0 0 19.884a5.381 5.381 0 0 0 5.376 5.387h14.336a5.381 5.381 0 0 0 5.376-5.387 5.381 5.381 0 0 0-5.376-5.386" fill="#36C5F0"/>
          <path d="M53.76 19.884a5.381 5.381 0 0 0-5.376-5.386 5.381 5.381 0 0 0-5.376 5.386v5.387h5.376a5.381 5.381 0 0 0 5.376-5.387m-14.336 0V5.52A5.381 5.381 0 0 0 34.048.133a5.381 5.381 0 0 0-5.376 5.387v14.364a5.381 5.381 0 0 0 5.376 5.387 5.381 5.381 0 0 0 5.376-5.387" fill="#2EB67D"/>
          <path d="M34.048 54a5.381 5.381 0 0 0 5.376-5.387 5.381 5.381 0 0 0-5.376-5.386h-5.376v5.386A5.381 5.381 0 0 0 34.048 54m0-14.365h14.336a5.381 5.381 0 0 0 5.376-5.386 5.381 5.381 0 0 0-5.376-5.387H34.048a5.381 5.381 0 0 0-5.376 5.387 5.381 5.381 0 0 0 5.376 5.386" fill="#ECB22E"/>
          <path d="M0 34.249a5.381 5.381 0 0 0 5.376 5.386 5.381 5.381 0 0 0 5.376-5.386v-5.387H5.376A5.381 5.381 0 0 0 0 34.25m14.336-.001v14.364A5.381 5.381 0 0 0 19.712 54a5.381 5.381 0 0 0 5.376-5.387V34.249a5.381 5.381 0 0 0-5.376-5.387 5.381 5.381 0 0 0-5.376 5.387" fill="#E01E5A"/>
        </g>
      </svg>
      slack
    </a>
  </div>

  <div class="auth-main">
    <!-- Tab switcher -->
    <div id="authForm">
      <h1>ワークスペースにサインイン</h1>
      <p class="subtitle"><strong>仕事用のメールアドレス</strong>を使うことをおすすめします。</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">ログイン</button>
        <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">新規登録</button>
      </div>

      <div class="auth-error" id="authError"></div>

      <!-- Login form -->
      <form id="loginForm" onsubmit="return false;">
        <input type="email" class="email-input" id="loginEmail" placeholder="名前@work-email.com" required>
        <input type="password" class="password-input" id="loginPassword" placeholder="パスワード" required minlength="6">
        <button type="submit" class="submit-btn" id="loginSubmit">サインイン</button>
      </form>

      <!-- Signup form -->
      <form id="signupForm" onsubmit="return false;" style="display:none;">
        <input type="email" class="email-input" id="signupEmail" placeholder="名前@work-email.com" required>
        <input type="password" class="password-input" id="signupPassword" placeholder="パスワード（6文字以上）" required minlength="6">
        <input type="password" class="password-input" id="signupPasswordConfirm" placeholder="パスワード（確認）" required minlength="6">
        <button type="submit" class="submit-btn" id="signupSubmit">アカウントを作成</button>
      </form>
    </div>

    <!-- Signup Success -->
    <div class="auth-success" id="signupSuccess">
      <div class="auth-success-icon">&#9993;&#65039;</div>
      <h3>確認メールを送信しました</h3>
      <p>メール内のリンクをクリックしてアカウントを有効にしてください。</p>
      <div style="margin-top:16px;">
        <a onclick="showLogin()" style="color:#1264a3;cursor:pointer;font-size:14px;">ログインページへ戻る</a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="auth-footer">
    <a href="#">プライバシーと利用規約</a>
    <a href="#">お問い合わせ</a>
    <a href="#">地域を変更</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script>
    const authError = document.getElementById('authError');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const signupSuccess = document.getElementById('signupSuccess');
    const authForm = document.getElementById('authForm');
    const tabLogin = document.getElementById('tabLogin');
    const tabSignup = document.getElementById('tabSignup');

    function switchTab(mode) {
      authError.classList.remove('show');
      if (mode === 'login') {
        tabLogin.classList.add('active');
        tabSignup.classList.remove('active');
        loginForm.style.display = '';
        signupForm.style.display = 'none';
      } else {
        tabLogin.classList.remove('active');
        tabSignup.classList.add('active');
        loginForm.style.display = 'none';
        signupForm.style.display = '';
      }
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.classList.add('show');
    }

    // ログイン
    loginForm.addEventListener('submit', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) return;

      const btn = document.getElementById('loginSubmit');
      btn.disabled = true;
      authError.classList.remove('show');

      try {
        const result = await signInWithEmail(email, password);
        if (result.error) { showError(result.error); btn.disabled = false; return; }
        window.location.href = 'index.html';
      } catch (e) {
        showError('エラーが発生しました: ' + e.message);
      }
      btn.disabled = false;
    });

    // 新規登録
    signupForm.addEventListener('submit', async () => {
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
      if (!email || !password) return;

      if (password !== passwordConfirm) {
        showError('パスワードが一致しません。');
        return;
      }

      const btn = document.getElementById('signupSubmit');
      btn.disabled = true;
      authError.classList.remove('show');

      try {
        const result = await signUpWithEmail(email, password);
        if (result.error) { showError(result.error); btn.disabled = false; return; }
        authForm.style.display = 'none';
        signupSuccess.classList.add('show');
      } catch (e) {
        showError('エラーが発生しました: ' + e.message);
      }
      btn.disabled = false;
    });

    // 既にログイン済みならリダイレクト
    (async () => {
      const user = await getCurrentUser();
      if (user) {
        window.location.href = 'index.html';
      }
    })();
  </script>
</body>
</html>
