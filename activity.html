<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アクティビティ - Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    .activity-layout { display: flex; flex: 1; overflow: hidden; }

    /* Left panel */
    .activity-left {
      width: 420px; flex-shrink: 0; display: flex; flex-direction: column;
      border-right: 1px solid var(--border); background: #1A1D21;
    }
    .activity-left-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .activity-left-header h2 { font-size: 17px; font-weight: 700; color: #fff; }
    .activity-left-header-right { display: flex; align-items: center; gap: 8px; }
    .activity-unread-label { font-size: 13px; color: #999; }
    .activity-toggle {
      width: 36px; height: 20px; border-radius: 10px; background: #555;
      position: relative; cursor: pointer; border: none;
    }
    .activity-toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%; background: #999;
      transition: transform 0.2s;
    }
    .activity-toggle.on { background: #2BAC76; }
    .activity-toggle.on::after { transform: translateX(16px); background: white; }

    /* Tab */
    .activity-tabs {
      display: flex; padding: 0 16px; border-bottom: 1px solid var(--border);
    }
    .activity-tab {
      padding: 10px 14px; border: none; background: none;
      font-size: 13px; font-family: var(--font); color: #999; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .activity-tab.active { color: #fff; font-weight: 700; border-bottom-color: #1D9BD1; }

    /* Empty state */
    .activity-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 30px;
      text-align: center;
    }
    .activity-empty-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: #2BAC76; display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 14px;
    }
    .activity-empty-title {
      font-size: 16px; font-weight: 700; color: #e0e0e0; margin-bottom: 8px;
    }
    .activity-empty-desc {
      font-size: 14px; color: #999; line-height: 1.6; max-width: 300px;
    }

    /* Right panel - illustration */
    .activity-right {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #1A1D21;
    }
    .activity-right-illustration {
      position: relative; width: 200px; height: 200px;
    }
    .activity-at-symbol {
      width: 180px; height: 180px; border-radius: 50%;
      background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 40%, #7d3c98 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 100px; color: rgba(255,255,255,0.3); font-weight: 700;
      box-shadow: 0 20px 60px rgba(155,89,182,0.3);
      transform: perspective(400px) rotateX(15deg) rotateY(-10deg);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="main-wrapper">
      <!-- Top Bar -->
      <div class="top-bar">
        <div class="top-bar-left">
          <button class="top-bar-arrow">&#8592;</button>
          <button class="top-bar-arrow">&#8594;</button>
          <button class="top-bar-arrow"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="6"/><path d="M8 4.5v4l2.5 1.5"/></svg></button>
        </div>
        <div class="top-bar-search">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"><circle cx="6" cy="6" r="4.5"/><path d="M9.5 9.5l3 3"/></svg>
          <span>Workspace 内を検索する</span>
        </div>
        <div class="top-bar-right">
          <div class="top-bar-avatar">&#128036;</div>
          <button class="top-bar-help">?</button>
        </div>
      </div>

      <main class="main-content">
        <div class="activity-layout">
          <!-- Left panel -->
          <div class="activity-left">
            <div class="activity-left-header">
              <h2>アクティビティ</h2>
              <div class="activity-left-header-right">
                <span class="activity-unread-label">未読メッセージ</span>
                <button class="activity-toggle" id="activityToggle"></button>
              </div>
            </div>
            <div class="activity-tabs">
              <button class="activity-tab active">すべて</button>
            </div>
            <div class="activity-empty">
              <div class="activity-empty-icon">&#10003;</div>
              <div class="activity-empty-title">すべて確認済みです</div>
              <div class="activity-empty-desc">今のところアクティビティはないようです。新しいアクティビティがある場合は、ここに表示されます。</div>
            </div>
          </div>

          <!-- Right panel -->
          <div class="activity-right">
            <div class="activity-right-illustration">
              <div class="activity-at-symbol">@</div>
            </div>
          </div>
        </div>
      </main>

      <!-- Bottom Bar -->
      <div class="bottom-bar">
        <span>&#128276; 通知を受け取りたい場合には、Slack に許可を与えてください。</span>
        <a href="#">通知を有効にする</a>
        <button class="bottom-bar-close">&#10005;</button>
      </div>
    </div>
  </div>

  <script src="sidebar-template.js"></script>
  <script>
    // Insert only icon sidebar
    var app = document.querySelector('.app');
    var wrapper = app.querySelector('.main-wrapper');
    wrapper.insertAdjacentHTML('beforebegin', getIconSidebar('activity'));

    // Toggle
    document.getElementById('activityToggle').addEventListener('click', function() {
      this.classList.toggle('on');
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-guard.js"></script>
</body>
</html>
