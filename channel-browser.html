<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャンネル一覧 - Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <main class="main-content">
      <header class="channel-header">
        <div class="channel-header-left">
          <h2 class="channel-title">チャンネルを検索</h2>
        </div>
        <div class="channel-header-right">
          <button class="header-btn" style="background:#007a5a;color:white;border:none;">+ チャンネルを作成</button>
        </div>
      </header>
      <div class="messages-container" style="padding:20px;">
        <input type="text" class="search-page-input" placeholder="チャンネル名で検索...">
        <div class="channel-browse-item">
          <div style="flex:1;">
            <div class="channel-browse-name"># all-kotaro</div>
            <div class="channel-browse-desc">チームの全体チャンネル</div>
          </div>
          <span class="channel-browse-members">👤 1</span>
          <button class="join-btn joined">参加済み</button>
        </div>
        <div class="channel-browse-item">
          <div style="flex:1;">
            <div class="channel-browse-name"># ソーシャル</div>
            <div class="channel-browse-desc">雑談チャンネル</div>
          </div>
          <span class="channel-browse-members">👤 1</span>
          <button class="join-btn joined">参加済み</button>
        </div>
        <div class="channel-browse-item">
          <div style="flex:1;">
            <div class="channel-browse-name"># 新しいチャンネル</div>
            <div class="channel-browse-desc"></div>
          </div>
          <span class="channel-browse-members">👤 1</span>
          <button class="join-btn joined">参加済み</button>
        </div>
      </div>
    </main>
  </div>
  <script src="sidebar-template.js"></script>
  <script>insertSidebar('home');</script>
</body>
</html>
