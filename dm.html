<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダイレクトメッセージ - Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* DM sidebar */
    .dm-sidebar {
      width: 340px; background: var(--channel-bg); color: var(--text-sidebar);
      display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
      border-right: 1px solid var(--border);
    }
    .dm-sidebar-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
    }
    .dm-sidebar-title { font-size: 16px; font-weight: 700; color: #fff; }
    .dm-sidebar-title-dropdown { font-size: 10px; opacity: 0.5; margin-left: 2px; }
    .dm-sidebar-header-right { margin-left: auto; display: flex; gap: 4px; align-items: center; }
    .dm-sidebar-header-btn {
      background: none; border: none; color: var(--text-sidebar); cursor: pointer;
      padding: 4px 6px; border-radius: 6px; display: flex; align-items: center; opacity: 0.7;
    }
    .dm-sidebar-header-btn:hover { background: var(--channel-hover); opacity: 1; }

    .dm-search {
      margin: 8px 12px; padding: 6px 10px; border-radius: 6px;
      background: #2a2d32; border: none; display: flex; align-items: center; gap: 6px;
    }
    .dm-search input {
      background: none; border: none; outline: none; color: #ccc; font-size: 13px;
      font-family: var(--font); flex: 1;
    }
    .dm-search input::placeholder { color: #9b8e9b; }

    .dm-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .dm-list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 14px; cursor: pointer; border: none; background: none;
      width: 100%; text-align: left; font-family: var(--font);
    }
    .dm-list-item:hover { background: var(--channel-hover); }
    .dm-list-item.active { background: var(--channel-active); }
    .dm-list-item-avatar {
      width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      color: #fff; font-weight: 700; position: relative;
    }
    .dm-list-item-avatar .status-ring {
      position: absolute; bottom: -2px; right: -2px;
      width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--channel-bg);
      background: #2BAC76;
    }
    .dm-list-item-info { flex: 1; min-width: 0; }
    .dm-list-item-name { font-size: 14px; font-weight: 600; color: #ddd; }
    .dm-list-item-preview {
      font-size: 12px; color: #999; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; line-height: 1.4;
    }

    /* Main chat area */
    .dm-main-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; border-bottom: 1px solid var(--border); min-height: 48px;
    }
    .dm-main-header-left { display: flex; align-items: center; gap: 8px; }
    .dm-main-header-left .star { font-size: 18px; color: #666; cursor: pointer; }
    .dm-main-header-left .dm-avatar-header {
      width: 24px; height: 24px; border-radius: 6px; font-size: 13px;
      display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700;
      position: relative;
    }
    .dm-main-header-left .dm-name-header { font-size: 16px; font-weight: 700; color: #e8e8e8; }
    .dm-main-header-right { display: flex; gap: 6px; }

    .dm-tabs {
      display: flex; gap: 0; padding: 0 16px; border-bottom: 1px solid var(--border);
    }
    .dm-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px; border: none; background: none;
      font-size: 13px; font-family: var(--font); color: #999; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .dm-tab.active { color: #fff; font-weight: 700; border-bottom-color: #1D9BD1; }

    .dm-welcome {
      display: flex; flex-direction: column; align-items: flex-start;
      padding: 0 24px 24px; max-width: 700px;
      margin-top: auto;
    }
    .dm-welcome-photo {
      width: 140px; height: 110px; border-radius: 10px; object-fit: cover;
      display: flex; align-items: center; justify-content: center;
      font-size: 50px; margin-bottom: 12px; color: #fff; font-weight: 700;
      border: 1px solid #383838;
    }
    .dm-welcome-name {
      font-size: 20px; font-weight: 700; color: #e8e8e8;
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
    }
    .dm-welcome-name .online-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #2BAC76;
    }
    .dm-welcome-desc {
      font-size: 15px; color: #bbb; line-height: 1.7; margin-bottom: 18px;
    }
    .dm-welcome-edit-btn {
      padding: 8px 18px; border: 1px solid #666; border-radius: 8px;
      background: none; color: #ddd; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: var(--font);
    }
    .dm-welcome-edit-btn:hover { background: #2a2d32; }
  </style>
</head>
<body style="visibility:hidden;">
  <div class="app">
    <!-- Icon sidebar inserted by JS -->

    <!-- DM Sidebar -->
    <aside class="dm-sidebar">
      <div class="dm-sidebar-header">
        <span class="dm-sidebar-title">ダイレクトメッセージ <span class="dm-sidebar-title-dropdown">&#9662;</span></span>
        <div class="dm-sidebar-header-right">
          <button class="dm-sidebar-header-btn" title="新規メッセージ">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M11 1l4 4-9 9H2v-4L11 1z"/></svg>
          </button>
        </div>
      </div>

      <div class="dm-search">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#9b8e9b" stroke-width="1.5"><circle cx="6" cy="6" r="4.5"/><path d="M9.5 9.5l3 3"/></svg>
        <input type="text" id="dmSearchInput" placeholder="DM を見つける">
      </div>

      <div class="dm-list" id="dmList">
        <!-- Dynamically populated by dm-app.js -->
      </div>
    </aside>

    <!-- Main wrapper -->
    <div class="main-wrapper">
      <!-- Top Bar -->
      <div class="top-bar">
        <div class="top-bar-left">
          <button class="top-bar-arrow">&#8592;</button>
          <button class="top-bar-arrow">&#8594;</button>
          <button class="top-bar-arrow"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="6"/><path d="M8 4.5v4l2.5 1.5"/></svg></button>
        </div>
        <div class="top-bar-search">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"><circle cx="6" cy="6" r="4.5"/><path d="M9.5 9.5l3 3"/></svg>
          <span id="searchPlaceholder">Workspace 内を検索する</span>
        </div>
        <div class="top-bar-right">
          <div class="top-bar-avatar" id="topBarAvatar">U</div>
          <button class="top-bar-help">?</button>
        </div>
      </div>

      <main class="main-content">
        <!-- DM Header -->
        <div class="dm-main-header">
          <div class="dm-main-header-left">
            <span class="star">&#9734;</span>
            <div class="dm-avatar-header" id="dmHeaderAvatar" style="background:#7eb8da;position:relative;">
              U
              <span style="position:absolute;bottom:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:#2BAC76;border:2px solid #1A1D21;"></span>
            </div>
            <span class="dm-name-header" id="dmHeaderName">ユーザー</span>
          </div>
          <div class="dm-main-header-right">
            <button class="header-icon-btn" title="通知">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 7A4 4 0 006 7v4l-2 2h12l-2-2V7z"/><path d="M8.5 15a1.5 1.5 0 003 0"/></svg>
            </button>
            <button class="header-icon-btn" onclick="location.href='search.html'" title="検索">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7.5" cy="7.5" r="5"/><path d="M11.5 11.5l4 4"/></svg>
            </button>
            <button class="header-icon-btn">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><circle cx="4" cy="9" r="1.3"/><circle cx="9" cy="9" r="1.3"/><circle cx="14" cy="9" r="1.3"/></svg>
            </button>
          </div>
        </div>

        <!-- DM Tabs -->
        <div class="dm-tabs">
          <button class="dm-tab active">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M1 3a1 1 0 011-1h10a1 1 0 011 1v7a1 1 0 01-1 1H4l-3 3V3z"/></svg>
            メッセージ
          </button>
          <button class="dm-tab">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="2" y="2" width="10" height="10" rx="1.5"/><path d="M5 5h4M5 7h4M5 9h2"/></svg>
            canvas を追加する
          </button>
          <button class="dm-tab" style="font-size:16px;padding:8px 10px;">+</button>
        </div>

        <!-- DM Content -->
        <div id="dmMessagesContainer" style="flex:1;overflow-y:auto;padding:0 20px;display:flex;flex-direction:column;">
          <div class="dm-welcome" id="dmWelcomeSection">
            <div class="dm-welcome-photo" id="dmWelcomeAvatar" style="background:linear-gradient(135deg, #7eb8da 0%, #7eb8da88 100%);">U</div>
            <div class="dm-welcome-name" id="dmWelcomeName">ユーザー <span class="online-dot"></span></div>
            <p class="dm-welcome-desc" id="dmWelcomeDesc">
              <strong style="color:#e0e0e0;">ここはあなただけのスペースです。</strong> メッセージの下書きや、To-doリストの作成、リンクやファイルの保管などに使うと便利です。
            </p>
            <button class="dm-welcome-edit-btn" id="dmWelcomeBtn">プロフィールを表示する</button>
          </div>
        </div>

        <!-- Message Input -->
        <div class="message-input-container">
          <div class="message-toolbar">
            <button class="toolbar-btn" onclick="insertFormatting(document.getElementById('dmMessageInput'), 'bold')"><strong>B</strong></button>
            <button class="toolbar-btn" onclick="insertFormatting(document.getElementById('dmMessageInput'), 'italic')"><em>I</em></button>
            <button class="toolbar-btn" style="text-decoration:underline;">U</button>
            <button class="toolbar-btn" onclick="insertFormatting(document.getElementById('dmMessageInput'), 'strikethrough')"><s>S</s></button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" onclick="insertFormatting(document.getElementById('dmMessageInput'), 'link')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M6 8l2-2a2.5 2.5 0 013.5 3.5l-2 2"/><path d="M8 6l-2 2a2.5 2.5 0 01-3.5-3.5l2-2"/></svg></button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" onclick="insertFormatting(document.getElementById('dmMessageInput'), 'bullet')"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1.5" width="1.5" height="1.5" rx="0.3"/><rect x="3.5" y="1.5" width="10.5" height="1.2"/><rect x="0" y="6" width="1.5" height="1.5" rx="0.3"/><rect x="3.5" y="6" width="10.5" height="1.2"/><rect x="0" y="10.5" width="1.5" height="1.5" rx="0.3"/><rect x="3.5" y="10.5" width="10.5" height="1.2"/></svg></button>
            <button class="toolbar-btn" onclick="insertFormatting(document.getElementById('dmMessageInput'), 'numbered')"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><text x="0" y="3" font-size="4" font-weight="700">1.</text><rect x="3.5" y="1.5" width="10.5" height="1.2"/><text x="0" y="7.5" font-size="4" font-weight="700">2.</text><rect x="3.5" y="6" width="10.5" height="1.2"/><text x="0" y="12" font-size="4" font-weight="700">3.</text><rect x="3.5" y="10.5" width="10.5" height="1.2"/></svg></button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" onclick="insertFormatting(document.getElementById('dmMessageInput'), 'blockquote')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 1v12"/><path d="M4 4h8v6H4"/></svg></button>
            <button class="toolbar-btn" onclick="insertFormatting(document.getElementById('dmMessageInput'), 'code')">&lt;/&gt;</button>
          </div>
          <div class="input-wrapper">
            <textarea id="dmMessageInput" placeholder="メッセージ" rows="1"></textarea>
          </div>
          <div class="input-actions">
            <div class="input-actions-left">
              <button class="action-btn"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="8"/><path d="M6 10h8M10 6v8"/></svg></button>
              <button class="action-btn action-btn-text">Aa</button>
              <button class="action-btn">&#128512;</button>
              <button class="action-btn" style="font-size:16px;font-weight:600;">@</button>
              <button class="action-btn"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="1" y="4" width="16" height="10" rx="2"/><polygon points="7,7 7,13 13,10" fill="currentColor" stroke="none" opacity="0.5"/></svg></button>
              <button class="action-btn"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M9 3a5 5 0 015 5v1a5 5 0 01-10 0V8a5 5 0 015-5z"/><path d="M9 13v3M6 16h6"/></svg></button>
              <button class="action-btn"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="2" width="12" height="14" rx="2"/><path d="M6 6h6M6 9h6M6 12h3"/></svg></button>
            </div>
            <div class="input-actions-right">
              <button class="send-btn" id="dmSendBtn" disabled style="background:#2BAC76;">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.3l13 6.7-13 6.7V9.3l7.5-1.3-7.5-1.3V1.3z"/></svg>
              </button>
              <button class="send-dropdown">&#9662;</button>
            </div>
          </div>
        </div>
      </main>

      <!-- Bottom Bar -->
      <div class="bottom-bar">
        <span>&#128276; 通知を受け取りたい場合には、Slack に許可を与えてください。</span>
        <a href="#">通知を有効にする</a>
        <button class="bottom-bar-close">&#10005;</button>
      </div>
    </div>
  </div>

  <!-- Insert only icon sidebar (not channel sidebar) -->
  <script src="sidebar-template.js"></script>
  <script>
    var app = document.querySelector('.app');
    var dmSidebar = app.querySelector('.dm-sidebar');
    dmSidebar.insertAdjacentHTML('beforebegin', getIconSidebar('dm'));
    dmSidebar.insertAdjacentHTML('beforebegin', getMobileSidebarOverlay());
    var mw = app.querySelector('.main-wrapper');
    if (mw) mw.insertAdjacentHTML('afterbegin', getMobileHeader('ダイレクトメッセージ'));
    document.body.insertAdjacentHTML('beforeend', getMobileTabBar('dm'));
    injectMorePopup();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-guard.js"></script>
  <script src="message-format.js"></script>
  <script src="dm-app.js"></script>
</body>
</html>
