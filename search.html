<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検索 - Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <main class="main-content">
      <header class="channel-header">
        <div class="channel-header-left">
          <h2 class="channel-title">検索結果</h2>
        </div>
      </header>
      <div class="messages-container" style="padding:20px;">
        <input type="text" class="search-page-input" placeholder="メッセージ、ファイル、メンバーを検索..." value="デプロイ" autofocus>
        <div class="search-filters">
          <button class="search-filter active">すべて</button>
          <button class="search-filter">メッセージ</button>
          <button class="search-filter">ファイル</button>
          <button class="search-filter">チャンネル</button>
        </div>
        <div class="search-result">
          <div class="search-result-channel"># 新しいチャンネル · 佐藤健一 · 9:12</div>
          <div class="message-text"><span class="search-result-highlight">デプロイ</span>の件、昨日のPRをマージしました。ステージング環境で確認お願いします。</div>
        </div>
        <div class="search-result">
          <div class="search-result-channel"># all-Workspace · ユーザー · 昨日 14:30</div>
          <div class="message-text">次の<span class="search-result-highlight">デプロイ</span>は金曜の夜に予定しています。</div>
        </div>
      </div>
    </main>
  </div>
  <script src="sidebar-template.js"></script>
  <script>insertSidebar('more');</script>
  <script>
    document.querySelectorAll('.search-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.search-filter.active').classList.remove('active');
        btn.classList.add('active');
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-guard.js"></script>
</body>
</html>
