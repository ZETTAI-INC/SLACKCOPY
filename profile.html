<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール - Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="shared.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    .profile-page {
      flex: 1; overflow-y: auto; padding: 0;
      display: flex; flex-direction: column;
    }
    .profile-hero {
      padding: 40px 24px 24px; text-align: center;
      background: linear-gradient(180deg, var(--channel-bg) 0%, var(--main-bg) 100%);
    }
    .profile-avatar-large {
      width: 120px; height: 120px; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 56px; font-weight: 700; color: #fff;
      margin: 0 auto 16px; border: 3px solid rgba(255,255,255,0.1);
    }
    .profile-display-name {
      font-size: 24px; font-weight: 700; color: #e8e8e8; margin-bottom: 4px;
    }
    .profile-email {
      font-size: 14px; color: #999; margin-bottom: 12px;
    }
    .profile-status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 20px;
      background: rgba(43,172,118,0.15); color: #2BAC76;
      font-size: 13px; font-weight: 600;
    }
    .profile-status-badge .dot {
      width: 8px; height: 8px; border-radius: 50%; background: #2BAC76;
    }
    .profile-menu {
      padding: 16px; flex: 1;
    }
    .profile-menu-section {
      margin-bottom: 8px;
    }
    .profile-menu-section-title {
      font-size: 12px; font-weight: 700; color: #888;
      padding: 8px 12px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .profile-menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 12px; border-radius: 10px;
      background: none; border: none; color: #ddd;
      font-size: 15px; font-family: var(--font); cursor: pointer;
      width: 100%; text-align: left; text-decoration: none;
    }
    .profile-menu-item:hover { background: var(--channel-hover); }
    .profile-menu-item svg { flex-shrink: 0; opacity: 0.7; }
    .profile-menu-item.danger { color: #e85050; }
    .profile-menu-item.danger svg { opacity: 1; }
    .profile-menu-sep {
      height: 1px; background: var(--border); margin: 8px 12px;
    }
  </style>
</head>
<body style="visibility:hidden;">
  <div class="app">
    <main class="main-content">
      <div class="profile-page">
        <!-- Hero -->
        <div class="profile-hero">
          <div class="profile-avatar-large" id="profileAvatar" style="background:#7eb8da;">U</div>
          <div class="profile-display-name" id="profileName">ユーザー</div>
          <div class="profile-email" id="profileEmail">user@example.com</div>
          <div class="profile-status-badge"><span class="dot"></span> アクティブ</div>
        </div>

        <!-- Menu -->
        <div class="profile-menu">
          <div class="profile-menu-section">
            <a href="dm.html" class="profile-menu-item">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 3h12a1 1 0 011 1v9a1 1 0 01-1 1H7l-4 3V4a1 1 0 011-1z"/></svg>
              ダイレクトメッセージ
            </a>
            <a href="index.html" class="profile-menu-item">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l7-5 7 5v8a1 1 0 01-1 1h-3v-4H7v4H4a1 1 0 01-1-1V8z"/></svg>
              チャンネル
            </a>
            <a href="settings.html" class="profile-menu-item">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="3"/><path d="M10 1v2m0 14v2M1 10h2m14 0h2m-3.3-5.3l-1.4 1.4M6.7 13.3l-1.4 1.4m0-9.4l1.4 1.4m6.6 6.6l1.4 1.4"/></svg>
              設定
            </a>
          </div>

          <div class="profile-menu-sep"></div>

          <div class="profile-menu-section">
            <a href="workspace-select.html" class="profile-menu-item">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="11" y="3" width="6" height="6" rx="1"/><rect x="3" y="11" width="6" height="6" rx="1"/><rect x="11" y="11" width="6" height="6" rx="1"/></svg>
              ワークスペースを切り替え
            </a>
          </div>

          <div class="profile-menu-sep"></div>

          <div class="profile-menu-section">
            <button class="profile-menu-item danger" onclick="handleLogout()">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 2H4a1 1 0 00-1 1v14a1 1 0 001 1h3M14 15l5-5-5-5M8 10h11"/></svg>
              ログアウト
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="sidebar-template.js"></script>
  <script>insertSidebar('you', '', 'あなた');</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-guard.js"></script>
  <script>
    async function handleLogout() {
      if (!confirm('ログアウトしますか？')) return;
      await signOut();
      location.href = 'auth.html';
    }

    (async () => {
      const user = await getCurrentUser();
      if (!user) return;
      const name = user.email ? user.email.split('@')[0] : 'ユーザー';
      const initial = name.charAt(0).toUpperCase();
      const colors = ['#e8a0bf','#7eb8da','#a0c4a8','#c4a0e8','#e8c0a0','#a0b8e8'];
      const color = colors[name.charCodeAt(0) % colors.length];

      document.getElementById('profileAvatar').textContent = initial;
      document.getElementById('profileAvatar').style.background = color;
      document.getElementById('profileName').textContent = name;
      document.getElementById('profileEmail').textContent = user.email || '';

      const iconUser = document.querySelector('.icon-sidebar-user');
      if (iconUser) iconUser.textContent = initial;
      const wsLetter = document.querySelector('.ws-letter');
      const wsId = localStorage.getItem('currentWorkspaceId');
      if (wsId) {
        const ws = await getWorkspace(wsId);
        if (ws) {
          if (wsLetter) wsLetter.textContent = ws.name.charAt(0).toUpperCase();
          const wsName = document.querySelector('.workspace-name');
          if (wsName) wsName.innerHTML = ws.name + ' <span class="ws-dropdown">&#9662;</span>';
        }
      }
      document.body.style.visibility = 'visible';
    })();
  </script>
</body>
</html>
